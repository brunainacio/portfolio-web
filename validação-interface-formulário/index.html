<!DOCTYPE html>
<html>
<head>
    <title>Validação de Formulário</title>
</head>
<body>

<form>
    <label>Nome:</label>
    <input type="text" required>
    <br><br>

    <label>E-mail:</label>
    <input type="email" required>
    <br><br>

    <label>Senha:</label>
    <input type="password" minlength="8" required>
    <br><br>

    <label>Idade:</label>
    <input type="number" min="18" max="100" required>
    <br><br>

    <button type="submit">Enviar</button>
</form>

</body>
</html>
