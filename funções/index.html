<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Funções JavaScript</title>
</head>
<body>

    <h1>Exemplo de Funções</h1>

    <input type="number" id="num1" placeholder="Primeiro número">
    <input type="number" id="num2" placeholder="Segundo número">

    <button onclick="somar()">Somar</button>

    <p id="resultado"></p>

    <script>
        function somar() {
            let numero1 = Number(document.getElementById("num1").value);
            let numero2 = Number(document.getElementById("num2").value);

            let resultado = numero1 + numero2;

            document.getElementById("resultado").innerHTML =
                "Resultado: " + resultado;
        }
    </script>

</body>
</html>
